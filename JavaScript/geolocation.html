<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>लखनऊ में भी पूरा पता दिखाएगा</title>
  <style>
    body{font-family:Arial,sans-serif;background:#1e3c72;color:#fff;text-align:center;padding:50px 20px;min-height:100vh;margin:0;display:flex;justify-content:center;align-items:center;background:linear-gradient(to right,#1e3c72,#2a5298);}
    .card{background:rgba(255,255,255,0.1);padding:40px;border-radius:20px;max-width:600px;width:100%;backdrop-filter:blur(10px);box-shadow:0 10px 30px rgba(0,0,0,0.4);}
    button{padding:16px 50px;font-size:1.3em;background:#fff;color:#1e3c72;border:none;border-radius:50px;margin:20px 0;cursor:pointer;font-weight:bold;}
    button:hover{transform:scale(1.05);}
    #result{margin-top:20px;padding:25px;background:rgba(255,255,255,0.15);border-radius:15px;font-size:1.2em;line-height:1.8;}
    .loader{border:6px solid #ffffff30;border-top:6px solid #fff;border-radius:50%;width:50px;height:50px;animation:spin 1s linear infinite;margin:20px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
  <div class="card">
    <h1>मेरा पूरा पता (लखनऊ में भी)</h1>
    <p>बटन दबाओ → लोकेशन Allow करो → पूरा इलाका, गली, पिन कोड सब दिखेगा!</p>
    <button id="find-me">मेरा पूरा पता दिखाओ</button>
    <div class="loader" id="loader" style="display:none;"></div>
    <div id="result">तैयार है...</div>
  </div>

<script>
document.getElementById('find-me').onclick = function() {
  const result = document.getElementById('result');
  const loader = document.getElementById('loader');
  const btn = this;
  
  result.innerHTML = "लोकेशन ले रहे हैं...";
  loader.style.display = "block";
  btn.disabled = true;

  if (!navigator.geolocation) {
    result.innerHTML = "ब्राउज़र लोकेशन सपोर्ट नहीं करता";
    loader.style.display = "none";
    return;
  }

  navigator.geolocation.getCurrentPosition(async pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    // BEST WORKING API FOR INDIA 2025 (tested in Lucknow right now)
    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1&accept-language=hi`);
    const data = await response.json();

    let fullAddress = "पता नहीं मिला";

    if (data && data.display_name) {
      fullAddress = data.display_name;
    } else if (data && data.address) {
      const a = data.address;
      fullAddress = `${a.road || a.neighbourhood || a.suburb || ""}, ${a.hamlet || a.village || a.suburb || a.city_district || ""}, ${a.city || a.town || "लखनऊ"}, ${a.state || "उत्तर प्रदेश"} ${a.postcode ? ", " + a.postcode : ""}, भारत`;
    }

    result.innerHTML = `
      <strong>आप यहाँ हैं:</strong><br><br>
      <div style="background:rgba(255,255,255,0.2);padding:20px;border-radius:12px;font-size:1.3em;">
        ${fullAddress.replace(/,\s*,/g, ',').replace(/,\s*$/, '')}
      </div><br>
      <small>Lat: ${lat.toFixed(6)}, Lon: ${lon.toFixed(6)}</small><br><br>
      <a href="https://maps.google.com?q=${lat},${lon}" target="_blank" style="color:#a8ffbc;font-weight:bold;">Google Maps में खोलें</a>
    `;
    
    loader.style.display = "none";
    btn.disabled = false;
  }, err => {
    result.innerHTML = "लोकेशन नहीं मिली। Permission दो या GPS ऑन करो।";
    loader.style.display = "none";
    btn.disabled = false;
  }, {enableHighAccuracy: true, timeout: 20000});
};
</script>
</body>
</html>
