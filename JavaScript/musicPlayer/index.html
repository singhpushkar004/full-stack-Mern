<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <div class="box">
        <div class="img">
            <img src="./img/ishq.jpg" alt="">
        </div>
        <audio src="./music/song2.mp3"></audio>
        <marquee direction="right" id="title">Hann</marquee>
        <div class="progress" role="progressbar" aria-label="Animated striped example" aria-valuenow="75"
            aria-valuemin="0" aria-valuemax="100">
            <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%" draggable="true"></div>
        </div>
        <div class="icon">
            <i class="fa-solid fa-backward" onclick="pre()"></i>
            <i class="fa-solid fa-play" onclick="aplay()"></i>
            <i class="fa-solid fa-pause" onclick="apause()"></i>
            <i class="fa-solid fa-forward" onclick="nxt()"></i>
        </div>
    </div>

    <script src="./js/script.js"></script>
</body>

</html>
